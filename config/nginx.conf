# ==========================================
# 1. Global Redirect: HTTP (80) to HTTPS (443)
# ==========================================
server {
    listen 80;
    server_name _;
    return 301 https://10.64.24.248$request_uri;
}

# ==========================================
# 2. Frontend Client (React/Vite)
# ==========================================
server {
    listen 443 ssl;
    server_name 10.64.24.248;

    ssl_certificate /etc/ssl/certs/selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/selfsigned.key;

    root /home/thesis/rizki/skripsi-Chat-APP/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ==========================================
# 3. Relay Node 1 (Public: 4431 -> Internal: 3001)
# ==========================================
server {
    listen 4431 ssl;
    server_name 10.64.24.248;

    ssl_certificate /etc/ssl/certs/selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/selfsigned.key;

    location ~* ^/(socket\.io|auth|internal|health|ping|admin)/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

